image_name: "ubuntu2022_gcc13"
image_base: "nvcr.io/nvidia/cuda:12.5.0-devel-ubuntu22.04"
cxx_compiler_id: "gcc"
cxx_compiler_version: "13"
cmake_version: "3.30.0"
python_version: "3.10.14"
python_conda_deps:
  - "pytorch"
  - "libboost-python-devel"
  - "libboost-headers"
  - "libboost-devel"
  - "pytorch-cuda=12.4"
  - "rdkit=2025.03.6"
  - "librdkit-dev=2025.03.6"
  - "scikit-build=0.18"
  - "pytest"
  - "warp-lang=1.3.1"

python_pip_deps:
install_clang_tools: false