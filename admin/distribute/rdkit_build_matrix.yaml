#
# Build-time pin manifest for the pip wheel path.
#
# For each supported rdkit pip version, records:
#   - rdkit_pypi_tag:   the kuelumbus/rdkit-pypi git tag whose setup.py recipe
#                       built the corresponding PyPI wheel. We clone rdkit-pypi
#                       at this tag and re-run its build to obtain headers and
#                       libs that exactly match the published wheel.
#   - boost_version:    the boost version that kuelumbus/rdkit-pypi linked the
#                       rdkit shared libraries against. Tracked here for
#                       documentation; the recipe build resolves it via conan.
#   - python_versions:  the CPython minor versions for which kuelumbus publishes
#                       a manylinux_2_28_x86_64 wheel. nvMolKit can only target
#                       a (rdkit, python) pair if a matching rdkit wheel exists.
#
# Sources of truth: kuelumbus/rdkit-pypi tag list and that tag's conanfile.py.

"2025.3.6":
  rdkit_pypi_tag: "2025.03.6"
  boost_version: "1.85.0"
  python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]

"2025.9.6":
  rdkit_pypi_tag: "2025.09.6"
  boost_version: "1.85.0"
  python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]

"2026.3.1":
  rdkit_pypi_tag: "2026.03.01"
  boost_version: "1.85.0"
  python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
