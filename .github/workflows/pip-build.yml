name: Pip Wheel Build

on:
  workflow_dispatch:
    inputs:
      rdkit_version:
        description: "Restrict to a single rdkit version (e.g. 2026.3.1). Empty = all entries in admin/distribute/rdkit_build_matrix.yaml."
        required: false
        default: ""
      python_version:
        description: "Restrict to a single python version (e.g. 3.12). Empty = all supported pythons for the selected rdkit version(s)."
        required: false
        default: ""

permissions:
  contents: read
  packages: read

concurrency:
  group: pip-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pre-built manylinux+CUDA image hosted on the org's GHCR. Bump the date tag
  # whenever admin/container/manylinux_2_28_cuda12.Dockerfile changes (and push
  # the new tag manually). The workflow does not build images.
  MANYLINUX_CUDA_IMAGE: ghcr.io/nvidia-digital-bio/nvmolkit-manylinux-cuda12:2026.04.28

jobs:
  matrix:
    name: Resolve build matrix
    runs-on: ubuntu-24.04
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate matrix from rdkit_build_matrix.yaml
        id: gen
        shell: bash
        env:
          DISPATCH_RDKIT: ${{ github.event.inputs.rdkit_version }}
          DISPATCH_PY: ${{ github.event.inputs.python_version }}
        run: |
          set -xeuo pipefail
          python -m pip install --quiet pyyaml
          python <<'PY' >> "${GITHUB_OUTPUT}"
          import json, os, re, sys, yaml
          matrix = yaml.safe_load(open("admin/distribute/rdkit_build_matrix.yaml"))
          rdkit_filter = os.environ.get("DISPATCH_RDKIT", "").strip()
          py_filter = os.environ.get("DISPATCH_PY", "").strip()
          include = []
          for rdkit_version, entry in matrix.items():
              if rdkit_filter and rdkit_version != rdkit_filter:
                  continue
              for py in entry["python_versions"]:
                  if py_filter and py != py_filter:
                      continue
                  include.append({"rdkit_version": rdkit_version, "python": py})
          if not include:
              print(f"No matrix entries match rdkit={rdkit_filter!r} python={py_filter!r}", file=sys.stderr)
              sys.exit(1)
          print("include=" + json.dumps(include))
          PY

  build-wheels:
    name: Wheel rdkit=${{ matrix.rdkit_version }} py${{ matrix.python }}
    needs: matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        shell: bash
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ env.MANYLINUX_CUDA_IMAGE }}
          CIBW_BUILD: cp${{ matrix.python }}-manylinux_x86_64
        run: |
          set -xeuo pipefail
          # CIBW_BUILD format expects no dot in the python tag.
          export CIBW_BUILD="${CIBW_BUILD/./}"
          bash admin/deploy/build_pip_wheels.sh "${{ matrix.rdkit_version }}" wheelhouse

      - name: Upload wheel
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: nvmolkit-wheel-rdkit${{ matrix.rdkit_version }}-py${{ matrix.python }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  smoke-test:
    name: Smoke rdkit=${{ matrix.rdkit_version }} py${{ matrix.python }}
    needs: [matrix, build-wheels]
    runs-on: colossus
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    steps:
      - name: Verify GPU access
        shell: bash
        run: |
          set -xeuo pipefail
          nvidia-smi

      - name: Check out source tree
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: nvmolkit-wheel-rdkit${{ matrix.rdkit_version }}-py${{ matrix.python }}
          path: wheelhouse

      - name: Install + import + tests
        shell: bash
        run: |
          set -xeuo pipefail
          py_tag="cp${{ matrix.python }}"
          py_tag="${py_tag/./}"
          wheel=$(ls wheelhouse/nvmolkit-*-${py_tag}-${py_tag}-manylinux_2_28_x86_64.whl)
          python -m pip install --upgrade pip
          python -m pip install "${wheel}" "rdkit==${{ matrix.rdkit_version }}" pytest pandas
          python -c "import nvmolkit; print(nvmolkit.__version__ if hasattr(nvmolkit, '__version__') else 'imported ok')"
          (cd && pytest --pyargs nvmolkit -k 'not long')
